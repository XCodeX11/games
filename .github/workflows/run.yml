name: Automated State Synchronization Loop

on:
  
  workflow_dispatch:

jobs:
  execute-sync:
    runs-on: ubuntu-latest

    steps:
    - name: Clone Logic Infrastructure
      uses: actions/checkout@v4

    - name: Clone Secure Storage Manifest
      uses: actions/checkout@v4
      with:
        repository: ${{ github.repository_owner }}/files
        token: ${{ secrets.Z_PAT }}
        path: storage_dir

    - name: Initialize File Runtime Matrix
      run: cp storage_dir/the_c.json ./the_c.json

    - name: Initialize Environment Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Network Request Dependencies
      run: pip install requests
    - name: Execute Core Network Cycle
      env:
        Z_UA: ${{ secrets.Z_UA }}
        Z_SOURCES: ${{ secrets.Z_SOURCES }}
        Z_DISCORD_WEBHOOK: ${{ secrets.Z_DISCORD_WEBHOOK }}
      run: python main.py
    - name: Relocate Updated Metadata Payload
      run: cp ./the_c.json storage_dir/the_c.json
      

      

    - name: Commit and Push Dynamic Manifest Sync Changes
      working-directory: storage_dir
      run: |
        git config --global user.name "GitHub Action Runner"
        git config --global user.email "actions@github.com"
        git add the_c.json
        if ! git diff --cached --quiet; then
          git commit -m "Automated Sync Cycle: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          git push origin main
        else
          echo "No changes detected inside data target mapping arrays. Skipping commit."
        fi
